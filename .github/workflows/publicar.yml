name: "publicar-antojitos-desktop"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publicar-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Instalar NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Instalar Rust estable
        uses: dtolnay/rust-toolchain@stable

      - name: Instalar dependencias web de frontend
        run: npm install

      - name: Usar Tauri-Action para compilar ejecutables
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # Toma la versión de tauri.conf.json
          releaseName: "Antojitos Desktop v__VERSION__"
          releaseBody: "Instalador Auto-Generado de Sistema Punto de Venta Antojitos."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
